# Simple GitHub Actions workflow for building and deploying a Vite site to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job for static asset hosting
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install  # <-- FIXED: Runs safely without package-lock.json

      - name: Build
        run: npm run build # <-- FIXED: Compiles TypeScript into high-performance web code

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # <-- FIXED: Uploads the compiled dist assets instead of raw code branch

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
